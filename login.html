<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUPHORIA — Login / Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">EUPHORIA.</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html">Shop</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 450px; margin-top: 60px;">

        <div class="auth-toggle">
            <button id="tabLogin" class="active" onclick="switchAuth('login')">Login</button>
            <button id="tabSignup" onclick="switchAuth('signup')">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="formLogin" class="auth-form">
            <h1>Welcome Back</h1>
            <p>Sign in to access your profile.</p>
            <form onsubmit="event.preventDefault(); handleLogin();">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required placeholder="name@example.com">

                <label>Password</label>
                <input type="password" id="loginPass" required placeholder="••••••••">

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Log In</button>
            </form>
        </div>

        <!-- SIGNUP FORM -->
        <div id="formSignup" class="auth-form" style="display:none;">
            <h1>Create Account</h1>
            <p>Join us for exclusive access.</p>
            <form onsubmit="event.preventDefault(); handleSignup();">
                <label>Full Name</label>
                <input type="text" id="signName" required placeholder="Jane Doe">

                <label>Email Address</label>
                <input type="email" id="signEmail" required placeholder="name@example.com">

                <label>Password</label>
                <input type="password" id="signPass" required placeholder="Create password">

                <label>Phone Number</label>
                <input type="tel" id="signPhone" required placeholder="+1 234 567 8900">

                <label>Shipping Address</label>
                <textarea id="signAddress" rows="3" required placeholder="123 Fashion St, Paris"></textarea>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>
        </div>

    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 EUPHORIA. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
