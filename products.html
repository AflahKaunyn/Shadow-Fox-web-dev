<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EUPHORIA — Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">EUPHORIA.</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Shop</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 id="pageTitle"></h2>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search for clothes, brand or category...">
      <button class="btn" id="searchBtn">Search</button>
    </div>

    <div class="filters">
      <select id="sort">
        <option value="relevance">Sort by: Relevance</option>
        <option value="low">Price — Low to High</option>
        <option value="high">Price — High to Low</option>
        <option value="popular">Popularity</option>
      </select>
    </div>

    <div id="productGrid" class="grid"></div>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; 2025 EUPHORIA. All rights reserved.</p>
      <div class="socials">
        <span>Instagram</span>
        <span>Twitter</span>
        <span>Pinterest</span>
      </div>
    </div>
  </footer>
</body>

</html>
