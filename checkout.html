<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EUPHORIA — Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="index.html">🛍️ EUPHORIA</a></div>
    <nav class="nav-icons">
      <a href="cart.html">Cart</a>
    </nav>
  </header>

<main class="container">
  <h2>Checkout</h2>
  <div class="checkout-layout">
    <form id="checkoutForm" class="checkout-form">
      <label>Full name <input name="name" required></label>
      <label>Phone <input name="phone" required></label>
      <label>Address <textarea name="address" rows="3" required></textarea></label>
      <label>City <input name="city" required></label>
      <label>State <input name="state" required></label>
      <label>Pincode <input name="pincode" required></label>
      <div class="pay-note">Payment method: <strong>Cash on Delivery (demo)</strong></div>
      <button class="btn" type="submit">Place Order</button>
    </form>

    <aside class="order-summary" id="orderSummary"></aside>
  </div>

  <div id="orderMessage"></div>
</main>


  <footer class="footer">
    <p>© 2025 EUPHORIA</p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateNavCartCount();
      renderOrderSummary();

      document.getElementById('checkoutForm').addEventListener('submit', e => {
        e.preventDefault();
        // demo order placement
        const form = e.target;
        const data = Object.fromEntries(new FormData(form).entries());
        if(!getCartItems().length) { alert('Your cart is empty'); return; }
        clearCart();
        updateNavCartCount();
        document.getElementById('orderMessage').innerHTML = '<div class="order-success">Order placed! Thank you ' + (data.name || '') + ' — This is a demo order.</div>';
        renderOrderSummary();
      });
    });
  </script>
</body>
</html>
