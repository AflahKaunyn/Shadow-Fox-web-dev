<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EUPHORIA — Your Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">EUPHORIA.</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="cart.html" class="active">Cart</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2>Your Cart</h2>
    <div id="cartItems" class="cart-list"></div>
    <h3>Total: ₹<span id="cartTotal">0</span></h3>
    <button onclick="openCheckout()" class="btn">Proceed to Checkout</button>
  </main>

  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <!-- Content injected by app.js openCheckout() -->
    </div>
  </div>


  <footer>
    <div class="footer-content">
      <p>&copy; 2025 EUPHORIA. All rights reserved.</p>
      <div class="socials">
        <span>Instagram</span>
        <span>Twitter</span>
        <span>Pinterest</span>
      </div>
    </div>
  </footer>
</body>

</html>
